<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Project</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

        <div class="outer-container">

            <div class="container">


                    <div class="top">
                        <p>Search Weather of your city</p>

                        <div class="div">
                            <form action="">

                                <input type="text" placeholder="Enter city name" id="city-input" required class="city-input">
                                <button id="search-btn" type="button" class="submit-btn">Search</button>
                            </form>
                            
                        </div>
                    </div>

                    <div class="mid">

                        <div class="left-side">


                                <div class="top-img">
                                    <img src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png" alt="weather-icon" id="weather-icon">
                                    <div class="infos">
                                        <p class="show-city">Dhaka</p>
                                        <div>
                                            <p class="show-tempurature">30°C</p>
                                            <p class="show-cloud-description"></p>
                                        </div>
                                        
                                    </div>
                                </div>

                                <div class="bottom-info">
                                    <div class="info-wind">6m/s W</div>
                                    <div class="info-humidity">6m/s W</div>
                                    <div class="info-visibility">6m/s W</div>
                                    <div class="info-pressure">6m/s W</div>
                                    <div class="info-sunrise">6m/s W</div>
                                    <div class="info-sunset">6m/s W</div>
                                </div>



                        </div>
                        <div class="right-side">
                            <div class="day"> NEXT 5 DAY FORECAST</div>

                            <div class="show-forecast">
                                
                            </div>

                        </div>



            </div>


        </div>

        
        





        
    </div>







<script src="logic.js" type="module"></script>
    
</body>
</html>
